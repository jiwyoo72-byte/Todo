<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="To-do" />
  <title>To-do</title>
  <link rel="apple-touch-icon" href="icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f0f12;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #c8f060;
      --accent2: #60d0f0;
      --text: #f0f0f4;
      --muted: #6a6a80;
      --done: #3a3a48;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nanum Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* 배경 장식 */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      right: -20%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(200,240,96,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: calc(var(--safe-top) + 24px) 20px calc(var(--safe-bottom) + 100px);
      min-height: 100dvh;
    }

    /* 헤더 */
    header {
      margin-bottom: 32px;
    }

    .date-label {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 36px;
      line-height: 1;
      color: var(--text);
    }

    .title span {
      color: var(--accent);
    }

    .stats {
      margin-top: 10px;
      display: flex;
      gap: 16px;
    }

    .stat {
      font-size: 12px;
      color: var(--muted);
    }

    .stat strong {
      color: var(--accent);
      font-size: 18px;
      font-weight: 800;
      display: block;
      line-height: 1;
    }

    /* 입력 영역 */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 6px 6px 6px 16px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }

    .input-area:focus-within {
      border-color: var(--accent);
    }

    .input-area input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 15px;
      color: var(--text);
      padding: 10px 0;
    }

    .input-area input::placeholder { color: var(--muted); }

    .add-btn {
      background: var(--accent);
      color: #0f0f12;
      border: none;
      border-radius: 10px;
      width: 42px; height: 42px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, opacity 0.2s;
      flex-shrink: 0;
    }

    .add-btn:active { transform: scale(0.92); }
    .add-btn:disabled { opacity: 0.3; cursor: default; }

    /* 섹션 라벨 */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 4px;
    }

    /* Todo 리스트 */
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .todo-item {
      background: var(--surface);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      transition: opacity 0.25s, transform 0.25s;
      animation: slideIn 0.25s ease;
      border: 1.5px solid transparent;
    }

    .todo-item.done {
      background: var(--done);
      opacity: 0.55;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 체크박스 */
    .check-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .todo-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-btn::after {
      content: '';
      width: 6px; height: 10px;
      border: 2px solid #0f0f12;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item.done .check-btn::after { opacity: 1; }

    /* 텍스트 */
    .todo-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-all;
      transition: color 0.2s;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* 삭제 버튼 */
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .todo-item:hover .del-btn,
    .todo-item:active .del-btn { opacity: 1; }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }

    .empty p { font-size: 14px; line-height: 1.6; }

    /* 완료 섹션 토글 */
    .done-toggle {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .done-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }

    .done-toggle.open .arrow { transform: rotate(90deg); }

    /* 하단 고정 배너 (홈화면 추가 안내) */
    .install-banner {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1.5px solid var(--accent2);
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 12px;
      color: var(--accent2);
      text-align: center;
      line-height: 1.5;
      width: calc(100% - 40px);
      max-width: 440px;
      z-index: 100;
      animation: fadeUp 0.5s 1s both;
    }

    .install-banner strong { display: block; font-size: 13px; margin-bottom: 2px; }

    .banner-close {
      position: absolute;
      top: 8px; right: 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="date-label" id="dateLabel"></div>
    <h1 class="title">할 <span>일</span></h1>
    <div class="stats">
      <div class="stat"><strong id="pendingCount">0</strong>남은 할 일</div>
      <div class="stat"><strong id="doneCount">0</strong>완료</div>
    </div>
  </header>

  <div class="input-area">
    <input type="text" id="todoInput" placeholder="새 할 일 입력…" maxlength="100" />
    <button class="add-btn" id="addBtn" disabled>+</button>
  </div>

  <div id="pendingSection">
    <div class="section-label">할 일</div>
    <ul class="todo-list" id="pendingList"></ul>
  </div>

  <div id="emptyState" class="empty hidden">
    <span class="empty-icon">✅</span>
    <p>할 일이 없어요!<br>오늘도 수고했어요 🎉</p>
  </div>

  <div id="doneSection" class="hidden">
    <button class="done-toggle" id="doneToggle">
      <span class="arrow">▶</span>
      완료됨 <span id="doneToggleCount"></span>
    </button>
    <ul class="todo-list" id="doneList" class="hidden"></ul>
  </div>
</div>

<div class="install-banner" id="installBanner">
  <button class="banner-close" id="bannerClose">✕</button>
  <strong>📱 홈화면에 추가하는 법</strong>
  Safari 하단 공유 버튼 → <b>"홈 화면에 추가"</b> 탭
</div>

<script>
  // ── 날짜 ──
  const days = ['일','월','화','수','목','금','토'];
  const now = new Date();
  document.getElementById('dateLabel').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;

  // ── 스토리지 ──
  const STORE_KEY = 'todos_v1';
  let todos = [];

  function load() {
    try { todos = JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch { todos = []; }
  }

  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(todos));
  }

  // ── 렌더 ──
  function render() {
    const pending = todos.filter(t => !t.done);
    const done    = todos.filter(t => t.done);

    document.getElementById('pendingCount').textContent = pending.length;
    document.getElementById('doneCount').textContent    = done.length;

    renderList('pendingList', pending);
    renderList('doneList', done);

    document.getElementById('emptyState').classList.toggle('hidden', pending.length > 0);
    document.getElementById('pendingSection').style.display = pending.length ? '' : 'none';

    const doneSection = document.getElementById('doneSection');
    doneSection.classList.toggle('hidden', done.length === 0);
    document.getElementById('doneToggleCount').textContent = `(${done.length})`;
  }

  function renderList(listId, items) {
    const ul = document.getElementById(listId);
    ul.innerHTML = '';
    items.forEach(t => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (t.done ? ' done' : '');
      li.dataset.id = t.id;
      li.innerHTML = `
        <button class="check-btn" aria-label="완료 토글"></button>
        <span class="todo-text">${escHtml(t.text)}</span>
        <button class="del-btn" aria-label="삭제">✕</button>
      `;
      li.querySelector('.check-btn').addEventListener('click', () => toggle(t.id));
      li.querySelector('.del-btn').addEventListener('click', () => remove(t.id));
      ul.appendChild(li);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 액션 ──
  function add() {
    const val = document.getElementById('todoInput').value.trim();
    if (!val) return;
    todos.unshift({ id: Date.now(), text: val, done: false });
    save(); render();
    document.getElementById('todoInput').value = '';
    document.getElementById('addBtn').disabled = true;
  }

  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save(); render();
  }

  // ── 이벤트 ──
  const input = document.getElementById('todoInput');
  const addBtn = document.getElementById('addBtn');

  input.addEventListener('input', () => {
    addBtn.disabled = input.value.trim() === '';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') add();
  });

  addBtn.addEventListener('click', add);

  // 완료 섹션 토글
  const doneToggle = document.getElementById('doneToggle');
  const doneList   = document.getElementById('doneList');
  let doneOpen = false;

  doneToggle.addEventListener('click', () => {
    doneOpen = !doneOpen;
    doneList.style.display = doneOpen ? '' : 'none';
    doneToggle.classList.toggle('open', doneOpen);
  });

  // 배너 닫기
  document.getElementById('bannerClose').addEventListener('click', () => {
    document.getElementById('installBanner').classList.add('hidden');
    localStorage.setItem('banner_closed', '1');
  });

  if (localStorage.getItem('banner_closed')) {
    document.getElementById('installBanner').classList.add('hidden');
  }

  // ── 초기화 ──
  load(); render();
</script>
</body>
</html>
